<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      min-height: 120px;
      font-family: Roboto, sans-serif;
      font-size: 13px;
      color: #0f0f0f;
      padding: 16px;
      margin: 0;
      background: #fff;
    }
    h2 {
      font-size: 15px;
      margin: 0 0 12px 0;
      color: #065fd4;
    }
    #status {
      background: #f8f8f8;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 12px;
      line-height: 1.6;
    }
    .count { font-weight: 600; font-size: 22px; color: #065fd4; }
    .label { color: #606060; font-size: 12px; }
    button {
      width: 100%;
      padding: 8px;
      background: #065fd4;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    button:hover { background: #0553bb; }
    button:disabled { background: #aaa; cursor: default; }
    #msg { margin-top: 8px; font-size: 12px; color: #606060; text-align: center; min-height: 16px; }
    .shortcut { font-size: 11px; color: #888; margin-top: 8px; text-align: center; }
    kbd {
      background: #f1f1f1;
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <h2>🔖 YT Research Flagger</h2>
  <div id="status">
    <div class="count" id="queue-count">—</div>
    <div class="label">videos queued</div>
  </div>
  <button id="flag-btn" disabled>Flag This Video</button>
  <div id="msg"></div>
  <div class="shortcut">Or press <kbd>Alt</kbd>+<kbd>S</kbd> on any YouTube video</div>
  <script src="popup.js"></script>
</body>
</html>
